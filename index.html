
<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>VendeMax MX</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

<header class="header">

  <div class="logo">
    VendeMax MX
  </div>

  <nav class="menu">
    <a href="#">Inicio</a>
    <a href="#">Productos</a>
    <a href="#">Ofertas</a>
    <a href="#">Contacto</a>
  </nav>

  <div class="actions">

    <input type="text" placeholder="Buscar">

    <button class="cart-btn">
      Carrito
    </button>

  </div>

</header>

<section class="hero">

  <div class="hero-content">

    <h1>
      Marketplace moderno para México
    </h1>

    <p>
      Compra productos premium de manera simple.
    </p>

    <button>
      Explorar productos
    </button>

  </div>

</section>

<section class="products">

  <h2>Productos destacados</h2>

  <div id="products-container" class="products-grid"></div>

</section>

<script type="module" src="js/app.js"></script>

</body>
</html>
